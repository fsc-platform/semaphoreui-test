[defaults]
collections_path = ./ansible_collections
roles_path = ./ansible/roles
library = ./ansible/plugins/modules
inventory_plugins = ./ansible/plugins/inventory
lookup_plugins = ./ansible/plugins/lookup
filter_plugins = ./ansible/plugins/filter
doc_fragment_plugins = ./ansible/plugins/doc_fragments
vars_plugins_enabled = host_group_vars
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_cache

# Use built-in YAML output format instead of deprecated community.general.yaml
result_format = yaml
callback_result_format = yaml

# Explicitly set Python interpreter to avoid discovery warnings
interpreter_python = auto_silent

# Explicitly set the stdout callback to default
stdout_callback = default

host_key_checking = False

jinja2_native = True
; [ssh_connection]
; retries = 10
; pipelining = True
; control_path = /tmp/ansible-ssh-%%h-%%p-%%r
; ssh_args = -o ControlMaster=auto -o ControlPersist=60s
